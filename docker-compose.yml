services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

  jobradar:
    build: .
    expose:
      - "8000"
    # ./data holds the tracked seeds (companies.json, funding_queue.json) and the
    # runtime state (seen_jobs.json, seen_funding.json). Deviates from the doc's
    # absolute /data:/data so the repo seeds are used directly with no manual copy.
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  caddy_data:
