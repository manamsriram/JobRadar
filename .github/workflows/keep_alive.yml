name: Keep Alive
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump timestamp
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .keepalive
          git config user.email "bot@jobradar"
          git config user.name "JobRadar Bot"
          git add .keepalive
          git commit -m "chore: keep alive $(date +%Y-%m-%d)" || echo "No change"
          git push
