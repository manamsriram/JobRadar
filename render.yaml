# Render Blueprint. Create the service via "New > Blueprint" pointed at this repo.
# Secrets (sync: false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: jobradar-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ALERT_TO
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://manamsriram.github.io
